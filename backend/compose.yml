services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: credplat_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  sut:
    build:
      context: .
      target: dev
    environment:
      NODE_ENV: test
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_NAME: credplat_test
      DATABASE_URL: postgresql://postgres:testpassword@db:5432/credplat_test
    depends_on:
      db:
        condition: service_healthy
